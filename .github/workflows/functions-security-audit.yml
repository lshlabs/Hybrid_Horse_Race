name: Functions Security Audit

on:
  pull_request:
    paths:
      - 'functions/**'
      - '.github/workflows/functions-security-audit.yml'
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - '.github/workflows/functions-security-audit.yml'
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

jobs:
  security-audit:
    name: Audit (High/Critical Gate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Security audit gate (high)
        run: npm run security:audit:high
